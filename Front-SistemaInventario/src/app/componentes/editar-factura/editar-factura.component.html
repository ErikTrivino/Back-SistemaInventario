<form [formGroup]="form" (ngSubmit)="actualizar()" class="container mt-4">
  <div class="mb-3">
    <label>Fecha</label>
    <input formControlName="fechaFactura" type="date" class="form-control" />
  </div>

  <div class="mb-3">
    <label>Total</label>
    <input type="number" formControlName="total" class="form-control" readonly />
  </div>

  <div class="mb-3">
    <label>Método de Pago</label>
    <input formControlName="metodoPago" class="form-control" />
  </div>

  <div class="mb-3">
    <label>Cliente</label>
    <select formControlName="idCliente" class="form-select">
      <option value="">Seleccione cliente</option>
      <option *ngFor="let c of clientes" [value]="c.id">{{ c.label }}</option>
    </select>
    <div class="input-group mt-2">
      <input formControlName="idCliente" type="number" class="form-control" placeholder="ID cliente" />
      <button type="button" class="btn btn-secondary" (click)="buscarCliente()">Buscar Cliente</button>
    </div>
  </div>

  <div class="mb-3">
    <label>Empleado</label>
    <select formControlName="idEmpleado" class="form-select">
      <option value="">Seleccione empleado</option>
      <option *ngFor="let e of empleados" [value]="e.id">{{ e.label }}</option>
    </select>
    <div class="input-group mt-2">
      <input formControlName="idEmpleado" type="number" class="form-control" placeholder="ID empleado" />
      <button type="button" class="btn btn-secondary" (click)="buscarEmpleado()">Buscar Empleado</button>
    </div>
  </div>

  <div class="text-center">
    <button class="btn btn-primary" type="submit">Actualizar Factura</button>
  </div>
</form>
