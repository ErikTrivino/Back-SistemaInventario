<div class="container mt-5">
  <div class="card">
    <div class="card-header">
      <h5><i class="fa-solid fa-pen-to-square me-2"></i>Editar Pedido</h5>
    </div>
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="editar()">
        <!-- Nombre del Pedido -->
<div class="mb-3">
  <label class="form-label">Nombre del Pedido:</label>
  <input type="text" formControlName="nombrePedido" class="form-control" />
</div>

<!-- Estado del Pedido -->
<div class="mb-3">
  <label class="form-label">Estado:</label>
  <input type="text" formControlName="estado" class="form-control" />
</div>

        <!-- Fecha Pedido -->
        <div class="mb-3">
          <label class="form-label">Fecha del Pedido:</label>
          <input type="date" formControlName="fechaPedido" class="form-control" />
        </div>

        <!-- Usuario -->
        <div class="mb-3">
          <label class="form-label">Usuario:</label>
          <select formControlName="idEmpleado" class="form-select">
            <option value="">Seleccione un usuario</option>
            <option *ngFor="let u of usuarios" [value]="u.idUsuario">
              {{ u.nombre }} - {{ u.identificacion }}
            </option>
          </select>
        </div>

        <!-- Proveedor -->
        <div class="mb-3">
          <label class="form-label">Proveedor:</label>
          <select formControlName="idProveedor" class="form-select">
            <option value="">Seleccione un proveedor</option>
            <option *ngFor="let p of proveedores" [value]="p.idProveedor">
              {{ p.nombre }} - {{ p.identificacion }}
            </option>
          </select>
        </div>

        <!-- Botón Guardar -->
        <div class="text-center mt-4">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-save me-2"></i>Guardar Cambios
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
