<div class="container mt-4">
  <h4>Crear Detalle de Servicio para Vehículo</h4>
  <form [formGroup]="formulario" (ngSubmit)="guardar()">
    <div class="mb-3">
      <label>Vehículo</label>
      <select class="form-select" formControlName="idVehiculo">
        <option *ngFor="let v of vehiculos" [value]="v.idVehiculo">
          {{ v.placa }} - {{ v.modelo }}
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label>Descripción</label>
      <input class="form-control" formControlName="descripcion" />
    </div>

    <div class="mb-3">
      <label>Costo</label>
      <input type="number" class="form-control" formControlName="costo" />
    </div>

    <button class="btn btn-success" type="submit" [disabled]="formulario.invalid">Guardar</button>
    <a routerLink="/gestion-servicio" class="btn btn-secondary ms-2">Cancelar</a>
  </form>
</div>
