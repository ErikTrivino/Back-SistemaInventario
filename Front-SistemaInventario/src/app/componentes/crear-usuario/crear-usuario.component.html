<div class="container mt-5">
  <div class="card shadow-sm border-0 rounded-3">
    <div class="card-header bg-primary text-white py-3">
      <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Crear Nuevo Usuario</h4>
    </div>
    <div class="card-body p-4">
      <form [formGroup]="form" (ngSubmit)="crear()">
        <div class="row g-3">
          <!-- Nombre -->
          <div class="col-md-6">
            <label class="form-label fw-bold">Nombre</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
              <input formControlName="nombre" class="form-control border-start-0 ps-0" placeholder="Ej. Juan" [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched" />
            </div>
          </div>

          <!-- Apellido -->
          <div class="col-md-6">
            <label class="form-label fw-bold">Apellido</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
              <input formControlName="apellido" class="form-control border-start-0 ps-0" placeholder="Ej. Pérez" [class.is-invalid]="form.get('apellido')?.invalid && form.get('apellido')?.touched" />
            </div>
          </div>

          <!-- Email -->
          <div class="col-md-6">
            <label class="form-label fw-bold">Correo Electrónico</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
              <input formControlName="email" type="email" class="form-control border-start-0 ps-0" placeholder="juan.perez@ejemplo.com" [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched" />
            </div>
          </div>

          <!-- Password -->
          <div class="col-md-6">
            <label class="form-label fw-bold">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
              <input formControlName="password" type="password" class="form-control border-start-0 ps-0" placeholder="********" [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched" />
            </div>
          </div>

          <!-- Rol -->
          <div class="col-md-6">
            <label class="form-label fw-bold">Rol de Usuario</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="fas fa-user-tag text-muted"></i></span>
              <select formControlName="rol" class="form-select border-start-0 ps-0" [class.is-invalid]="form.get('rol')?.invalid && form.get('rol')?.touched">
                <option value="" disabled selected>Seleccione un rol</option>
                <option *ngFor="let rol of roles" [value]="rol">{{ rol }}</option>
              </select>
            </div>
          </div>

          <!-- Sucursal -->
          <div class="col-md-6">
            <label class="form-label fw-bold">Sucursal Asignada</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="fas fa-store text-muted"></i></span>
              <select formControlName="sucursalAsignadaId" class="form-select border-start-0 ps-0" [class.is-invalid]="form.get('sucursalAsignadaId')?.invalid && form.get('sucursalAsignadaId')?.touched">
                <option [value]="null" disabled selected>Seleccione una sucursal</option>
                <option *ngFor="let suc of sucursales" [value]="suc.id">{{ suc.nombre }}</option>
              </select>
            </div>
          </div>

          <!-- Activo -->
          <div class="col-12 mt-4">
            <div class="form-check form-switch p-3 bg-light rounded-2 border">
              <input class="form-check-input ms-0 me-3" type="checkbox" id="flexSwitchCheckChecked" formControlName="activo">
              <label class="form-check-label fw-bold" for="flexSwitchCheckChecked">Usuario Activo</label>
            </div>
          </div>

          <div class="col-12 mt-4 d-flex justify-content-end gap-2">
            <button class="btn btn-outline-secondary px-4 text-dark" type="button" routerLink="/gestion-usuario">
              <i class="fas fa-arrow-left me-2"></i>Volver
            </button>
            <button class="btn btn-outline-warning px-4" type="button" (click)="form.reset({activo: true})">
              <i class="fas fa-eraser me-2"></i>Limpiar
            </button>
            <button class="btn btn-primary px-5 shadow-sm" type="submit" [disabled]="form.invalid">
              <i class="fas fa-save me-2"></i>Crear Usuario
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
