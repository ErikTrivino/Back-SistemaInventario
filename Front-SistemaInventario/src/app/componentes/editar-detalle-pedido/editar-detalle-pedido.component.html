<div class="container mt-5">
  <h3><i class="fa-solid fa-pen me-2"></i>Editar Detalle de Pedido</h3>

  <form [formGroup]="form" (ngSubmit)="guardar()" class="mt-4">

    <div class="mb-3">
      <label>Producto</label>
      <input formControlName="idProducto" class="form-control" />
    </div>
     <div class="mb-3">
      <label>Pedido</label>
      <input formControlName="idPedido" class="form-control" />
    </div>

    <div class="mb-3">
      <label>Cantidad</label>
      <input type="number" formControlName="cantidad" class="form-control" />
    </div>

    <div class="mb-3">
      <label>Precio</label>
      <input type="number" formControlName="precioUnitario" class="form-control" />
    </div>

    <button class="btn btn-primary"><i class="fa fa-save me-1"></i> Guardar</button>
    <a routerLink="/gestion-pedido" class="btn btn-secondary ms-2">Cancelar</a>
  </form>
</div>
