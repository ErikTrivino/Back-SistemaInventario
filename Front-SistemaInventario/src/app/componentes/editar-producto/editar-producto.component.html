<form [formGroup]="form" (ngSubmit)="editar()" class="container mt-4">
  <div class="mb-3">
    <label>Nombre</label>
    <input formControlName="nombre" class="form-control" />
  </div>

  <div class="mb-3">
    <label>Descripción</label>
    <input formControlName="descripcion" class="form-control" />
  </div>

  <div class="mb-3">
    <label>Precio</label>
    <input type="number" formControlName="singlePrice" class="form-control" />
  </div>

  <div class="mb-3">
    <label>Stock</label>
    <input type="number" formControlName="available" class="form-control" />
  </div>

  <!-- Selector de proveedor -->
  <div class="mb-3">
    <label>Proveedor</label>
    <select formControlName="idProveedor" class="form-select">
      <option value="">Seleccione un proveedor</option>
      <option *ngFor="let p of proveedores" [value]="p.id">{{ p.label }}</option>
    </select>
  </div>

  <!-- Búsqueda manual -->
  <div class="mb-3 input-group">
    <input type="number" formControlName="idProveedor" placeholder="ID del proveedor" class="form-control" />
    <button type="button" class="btn btn-outline-secondary" (click)="buscarProveedorPorId()">Buscar proveedor</button>
  </div>

  <div class="text-center">
    <button class="btn btn-primary" type="submit">Actualizar Producto</button>
  </div>
</form>
