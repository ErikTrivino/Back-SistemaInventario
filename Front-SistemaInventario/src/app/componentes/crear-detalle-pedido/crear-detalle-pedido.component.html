<div class="container mt-5">
  <h3><i class="fa-solid fa-plus me-2"></i>Crear Detalle de Pedido</h3>

  <form [formGroup]="form" (ngSubmit)="guardar()" class="mt-4">

  <div class="mb-3">
      <label>Producto</label>
      <select formControlName="idProducto" class="form-control">
        <option value="" disabled selected>Seleccione un producto</option>
        <option *ngFor="let producto of productos" [value]="producto.idProducto">{{ producto.nombre }}</option>
      </select>
    </div>

    <div class="mb-3">
      <label>Pedido</label>
      <select formControlName="idPedido" class="form-control">
        <option value="" disabled selected>Seleccione un pedido</option>
        <option *ngFor="let pedido of pedidos" [value]="pedido.idPedido">{{ pedido.idPedido }}</option>
      </select>
    </div>
    

    <div class="mb-3">
      <label>Cantidad</label>
      <input type="number" formControlName="cantidad" class="form-control" />
    </div>

    <div class="mb-3">
      <label>Precio</label>
      <input type="number" formControlName="precio" class="form-control" />
    </div>

    <button class="btn btn-success"><i class="fa fa-save me-1"></i> Guardar</button>
    <a routerLink="/gestion-pedido" class="btn btn-secondary ms-2">Cancelar</a>
  </form>
</div>
