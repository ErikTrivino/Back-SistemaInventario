<div class="container mt-5">
  <div class="card">
    <div class="card-header">
      <h5><i class="fa-solid fa-plus me-2"></i>Crear Detalle Servicio-Producto</h5>
    </div>
    <div class="card-body">
      <form [formGroup]="formulario" (ngSubmit)="guardar()">

        <!-- Producto -->
        <div class="mb-3">
          <label class="form-label">Producto:</label>
          <select formControlName="idProducto" class="form-select">
            <option value="">Seleccione un producto</option>
            <option *ngFor="let p of productos" [value]="p.idProducto">
              {{ p.nombre }} - {{ p.idProducto }}
            </option>
          </select>
        </div>

        <!-- Servicio -->
        <div class="mb-3">
          <label class="form-label">Servicio:</label>
          <select formControlName="idServicio" class="form-select">
            <option value="">Seleccione un servicio</option>
            <option *ngFor="let s of servicios" [value]="s.idServicio">
              {{ s.descripcion }} - {{ s.idServicio }}
            </option>
          </select>
        </div>

        <!-- Cantidad -->
        <div class="mb-3">
          <label class="form-label">Cantidad:</label>
          <input type="number" formControlName="cantidad" class="form-control" min="1" />
        </div>

        <div class="text-center">
          <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-save me-2"></i>Guardar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
